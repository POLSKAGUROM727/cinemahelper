<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TorrentDeck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0f1117;
      --bg2:    #161b27;
      --bg3:    #1e2433;
      --bg4:    #252d3d;
      --border: #2a3347;
      --bord2:  #334060;
      --green:  #22c55e;
      --cyan:   #38bdf8;
      --orange: #f97316;
      --red:    #ef4444;
      --yellow: #eab308;
      --purple: #a855f7;
      --blue:   #3b82f6;
      --pink:   #ec4899;
      --text:   #e2e8f0;
      --text2:  #94a3b8;
      --text3:  #64748b;
      --sans:   'Inter', system-ui, sans-serif;
      --mono:   'JetBrains Mono', monospace;
    }

    /* ── THEMES ── applied to <html> via data-theme attribute ── */

    /* 1. Midnight (default — deep navy blue) */
    [data-theme="midnight"] {
      --bg:     #0f1117; --bg2: #161b27; --bg3: #1e2433; --bg4: #252d3d;
      --border: #2a3347; --bord2: #334060;
      --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
      --cyan: #38bdf8; --green: #22c55e;
    }
    /* 2. Abyss (pure black, high contrast) */
    [data-theme="abyss"] {
      --bg:     #000000; --bg2: #0a0a0a; --bg3: #111111; --bg4: #1a1a1a;
      --border: #222222; --bord2: #333333;
      --text: #ffffff; --text2: #a0a0a0; --text3: #555555;
      --cyan: #00d4ff; --green: #00ff88;
    }
    /* 3. Forest (dark green, earthy) */
    [data-theme="forest"] {
      --bg:     #0d1410; --bg2: #131d17; --bg3: #192620; --bg4: #1f2e27;
      --border: #243628; --bord2: #2e4434;
      --text: #d4e8d4; --text2: #84a884; --text3: #4d6b4d;
      --cyan: #4ade80; --green: #86efac;
    }
    /* 4. Sunset (dark warm, orange/amber accents) */
    [data-theme="sunset"] {
      --bg:     #12090a; --bg2: #1c100f; --bg3: #251714; --bg4: #2e1e1a;
      --border: #3a2520; --bord2: #4a3028;
      --text: #f0ddd4; --text2: #b8896e; --text3: #7a5040;
      --cyan: #fb923c; --green: #fbbf24;
    }
    /* 5. Slate (cool grey, muted and minimal) */
    [data-theme="slate"] {
      --bg:     #0e1117; --bg2: #161a23; --bg3: #1d222e; --bg4: #242a38;
      --border: #2d3448; --bord2: #3a4260;
      --text: #cdd5e0; --text2: #7f8fa6; --text3: #505c70;
      --cyan: #748fca; --green: #63b3a0;
    }
    /* 6. Rose (dark pink/mauve, warm purple) */
    [data-theme="rose"] {
      --bg:     #110d12; --bg2: #1a1220; --bg3: #22182c; --bg4: #2a1e38;
      --border: #342444; --bord2: #412d58;
      --text: #edddef; --text2: #a07aaa; --text3: #644d70;
      --cyan: #e879f9; --green: #c084fc;
    }
    /* 7. Arctic (bright light, clean whites and blues) */
    [data-theme="arctic"] {
      --bg:     #f0f4f8; --bg2: #ffffff; --bg3: #e8eef4; --bg4: #d8e4ee;
      --border: #c0cdd8; --bord2: #a0b4c4;
      --text: #1a2635; --text2: #3a5068; --text3: #7a95aa;
      --cyan: #0284c7; --green: #16a34a;
    }
    /* 8. Latte (warm off-white, coffee tones) */
    [data-theme="latte"] {
      --bg:     #f5f0e8; --bg2: #fdf8f0; --bg3: #ede5d8; --bg4: #e0d4c0;
      --border: #ccc0a8; --bord2: #b8a888;
      --text: #2c1f0e; --text2: #6b4e2a; --text3: #9e7c50;
      --cyan: #b45309; --green: #15803d;
    }
    /* 9. Neon (dark bg, vivid electric accents — high visibility) */
    [data-theme="neon"] {
      --bg:     #080810; --bg2: #0e0e1c; --bg3: #141428; --bg4: #1c1c38;
      --border: #2a2a50; --bord2: #3a3a70;
      --text: #f0f0ff; --text2: #b0b0e0; --text3: #7070aa;
      --cyan: #00ffff; --green: #39ff14;
    }

    /* ── THEME PICKER ── */
    .theme-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text2); padding: 3px 10px; font-size: 11px; font-family: var(--sans);
      cursor: pointer; transition: all .13s; white-space: nowrap; flex-shrink: 0;
    }
    .theme-btn:hover { border-color: var(--bord2); color: var(--text); }
    .theme-icon { font-size: 13px; }

    .theme-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--bg2); border: 1px solid var(--bord2); border-radius: 10px;
      padding: 8px; z-index: 200;
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
      width: 230px;
      animation: tdropIn .12s ease;
    }
    @keyframes tdropIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

    .theme-option {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 8px 6px; border-radius: 7px; cursor: pointer;
      border: 2px solid transparent; transition: all .13s;
    }
    .theme-option:hover { background: var(--bg3); }
    .theme-option.active { border-color: var(--cyan); background: var(--bg3); }

    .theme-swatch {
      width: 44px; height: 30px; border-radius: 5px; overflow: hidden;
      display: grid; grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
    }
    .theme-swatch span { display: block; }
    .theme-label { font-size: 10px; font-weight: 600; color: var(--text2); letter-spacing: .5px; text-transform: uppercase; }
    .theme-option.active .theme-label { color: var(--cyan); }

    .theme-wrap { position: relative; flex-shrink: 0; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: var(--sans); font-size: 14px; color: var(--text);
      background: var(--bg); display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
    }

    /* ─── HEADER ─────────────────────────────────────────────── */
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 52px; flex-shrink: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .logo { font-family: var(--mono); font-weight: 600; font-size: 14px; letter-spacing: 3px; color: var(--cyan); white-space: nowrap; }
    .logo em { color: var(--green); font-style: normal; }
    .vsep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .status-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 10px; font-size: 11px; color: var(--text2); white-space: nowrap;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
    .dot.ok   { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 3s infinite; }
    .dot.fail { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .speeds { display: flex; gap: 10px; font-size: 11px; font-family: var(--mono); }
    .spd-dl { color: var(--green); } .spd-ul { color: var(--cyan); }
    .spacer { flex: 1; }
    .ts { font-size: 11px; font-family: var(--mono); color: var(--text3); }

    /* ─── SEARCH ─────────────────────────────────────────────── */
    .search-section {
      padding: 10px 16px; flex-shrink: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .search-row { display: flex; gap: 8px; }
    .input-wrap { flex: 1; position: relative; }
    .prompt { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--cyan); font-family: var(--mono); font-size: 15px; pointer-events: none; }
    input[type=text] {
      width: 100%; height: 40px;
      background: var(--bg3); border: 1px solid var(--bord2); border-radius: 6px;
      color: var(--text); padding: 0 12px 0 28px; font-family: var(--sans); font-size: 14px; outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    input[type=text]:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(56,189,248,.1); }
    input[type=text]::placeholder { color: var(--text3); }
    .search-btn {
      height: 40px; padding: 0 18px;
      background: var(--cyan); border: none; border-radius: 6px;
      color: #0f1117; font-family: var(--sans); font-weight: 600; font-size: 13px;
      cursor: pointer; transition: background .15s, opacity .15s;
      display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0;
    }
    .search-btn:hover:not(:disabled) { background: #7dd3fc; }
    .search-btn:disabled { opacity: .4; cursor: default; }

    /* ─── FILTER ROWS ────────────────────────────────────────── */
    .filter-section { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .filter-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-right: 2px; white-space: nowrap; }
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
      color: var(--text2); padding: 3px 10px; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all .13s; user-select: none; white-space: nowrap;
    }
    .pill:hover { border-color: var(--bord2); color: var(--text); }
    .pill.on          { background: rgba(56,189,248,.1);  border-color: var(--cyan);   color: var(--cyan); }
    .pill.bm.on       { background: rgba(168,85,247,.1);  border-color: var(--purple); color: var(--purple); }
    .pill.pr.on       { background: rgba(236,72,153,.1);  border-color: var(--pink);   color: var(--pink); }
    .pill.tf-movie.on     { background: rgba(59,130,246,.12);  border-color: var(--blue);   color: var(--blue); }
    .pill.tf-episode.on   { background: rgba(34,197,94,.12);   border-color: var(--green);  color: var(--green); }
    .pill.tf-multi_ep.on  { background: rgba(34,197,94,.12);   border-color: var(--green);  color: var(--green); }
    .pill.tf-season.on    { background: rgba(56,189,248,.12);  border-color: var(--cyan);   color: var(--cyan); }
    .pill.tf-series.on    { background: rgba(168,85,247,.12);  border-color: var(--purple); color: var(--purple); }
    .pill.tf-anime_ep.on  { background: rgba(249,115,22,.12);  border-color: var(--orange); color: var(--orange); }
    .pill.tf-anime_pack.on{ background: rgba(234,179,8,.12);   border-color: var(--yellow); color: var(--yellow); }
    .pill.tf-unknown.on   { background: rgba(100,116,139,.1);  border-color: var(--text3);  color: var(--text3); }
    .pill.qf.on           { background: rgba(251,191,36,.12);  border-color: var(--yellow); color: var(--yellow); }
    .pill .err-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
    .filter-div { width: 1px; height: 16px; background: var(--border); margin: 0 1px; flex-shrink: 0; }
    .err-msg { font-size: 11px; color: var(--red); }

    /* ─── MAIN LAYOUT ────────────────────────────────────────── */
    .main { display: grid; grid-template-columns: 1fr 380px; flex: 1; overflow: hidden; min-height: 0; }

    /* ─── PANEL CHROME ───────────────────────────────────────── */
    .panel { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .panel-head {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px; flex-shrink: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--text2);
    }
    .panel-head .count { background: var(--bg4); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; font-size: 11px; color: var(--cyan); }
    .scroll-area { overflow-y: auto; flex: 1; min-height: 0; -webkit-overflow-scrolling: touch; }
    .results-panel { border-right: 1px solid var(--border); }

    /* ─── RESULTS TABLE ──────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.col-name  { width: auto; }
    col.col-type  { width: 88px; }
    col.col-size  { width: 74px; }
    col.col-seeds { width: 56px; }
    col.col-leech { width: 56px; }
    col.col-src   { width: 98px; }
    col.col-act   { width: 80px; }
    thead th {
      padding: 7px 10px; text-align: left; font-size: 11px; font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase; color: var(--text3);
      background: var(--bg2); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 5; cursor: pointer; user-select: none; white-space: nowrap;
    }
    thead th:hover { color: var(--text2); }
    thead th.asc::after  { content: " ↑"; }
    thead th.desc::after { content: " ↓"; }
    tbody tr:hover td { background: var(--bg3); }
    tbody tr:nth-child(even) td { background: rgba(255,255,255,.014); }
    tbody tr:nth-child(even):hover td { background: var(--bg3); }
    tbody td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }

    .t-name  { font-size: 13px; line-height: 1.5; word-break: break-word; overflow-wrap: anywhere; color: var(--text); }
    .t-name a { color: inherit; text-decoration: none; }
    .t-name a:hover { color: var(--cyan); text-decoration: underline; text-underline-offset: 3px; }
    .t-info-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--bg4); border: 1px solid var(--border);
      color: var(--text3); font-size: 9px; font-weight: 700;
      cursor: pointer; flex-shrink: 0; vertical-align: middle;
      margin-left: 5px; transition: all .12s; font-family: var(--sans);
    }
    .t-info-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .t-size  { font-size: 12px; color: var(--text2); font-family: var(--mono); white-space: nowrap; }
    .t-seeds { font-size: 13px; color: var(--green);  font-family: var(--mono); font-weight: 600; }
    .t-leech { font-size: 13px; color: var(--orange); font-family: var(--mono); font-weight: 600; }

    /* ─── TYPE BADGES ────────────────────────────────────────── */
    .type-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px; white-space: nowrap;
      letter-spacing: .3px; font-family: var(--mono);
    }
    .tb-movie     { background: rgba(59,130,246,.15);  color: var(--blue);   border: 1px solid rgba(59,130,246,.3); }
    .tb-episode   { background: rgba(34,197,94,.15);   color: var(--green);  border: 1px solid rgba(34,197,94,.3); }
    .tb-multi_ep  { background: rgba(34,197,94,.12);   color: #4ade80;       border: 1px solid rgba(34,197,94,.25); }
    .tb-season    { background: rgba(56,189,248,.15);  color: var(--cyan);   border: 1px solid rgba(56,189,248,.3); }
    .tb-series    { background: rgba(168,85,247,.15);  color: var(--purple); border: 1px solid rgba(168,85,247,.3); }
    .tb-anime_ep  { background: rgba(249,115,22,.15);  color: var(--orange); border: 1px solid rgba(249,115,22,.3); }
    .tb-anime_pack{ background: rgba(234,179,8,.15);   color: var(--yellow); border: 1px solid rgba(234,179,8,.3); }
    .tb-unknown   { background: rgba(100,116,139,.1);  color: var(--text3);  border: 1px solid rgba(100,116,139,.2); }

    /* ─── SOURCE BADGES ──────────────────────────────────────── */
    .src-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px; white-space: nowrap; letter-spacing: .3px;
    }
    .src-tpb      { background: rgba(56,189,248,.12); color: var(--cyan);   border: 1px solid rgba(56,189,248,.25); }
    .src-yts      { background: rgba(234,179,8,.12);  color: var(--yellow); border: 1px solid rgba(234,179,8,.25); }
    .src-eztv     { background: rgba(236,72,153,.12); color: var(--pink);   border: 1px solid rgba(236,72,153,.25); }
    .src-nyaa     { background: rgba(168,85,247,.12); color: var(--purple); border: 1px solid rgba(168,85,247,.25); }
    .src-1337x    { background: rgba(249,115,22,.12); color: var(--orange); border: 1px solid rgba(249,115,22,.25); }
    .src-rarbg    { background: rgba(239,68,68,.12);  color: var(--red);    border: 1px solid rgba(239,68,68,.25); }
    .src-custom   { background: rgba(34,197,94,.12);  color: var(--green);  border: 1px solid rgba(34,197,94,.25); }
    .src-bitmagnet{ background: rgba(59,130,246,.12); color: var(--blue);   border: 1px solid rgba(59,130,246,.25); }
    .src-prowlarr { background: rgba(236,72,153,.12); color: var(--pink);   border: 1px solid rgba(236,72,153,.25); }

    .add-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: transparent; border: 1px solid var(--green); border-radius: 5px;
      color: var(--green); padding: 4px 9px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .13s; white-space: nowrap;
    }
    .add-btn:hover:not(:disabled) { background: var(--green); color: #0f1117; }
    .add-btn.added { border-color: var(--cyan); color: var(--cyan); cursor: default; background: rgba(56,189,248,.08); }
    .add-btn:disabled { opacity: .35; cursor: default; }

    /* ─── EMPTY ──────────────────────────────────────────────── */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px 20px; text-align: center; }
    .empty-icon { font-size: 38px; margin-bottom: 14px; opacity: .25; }
    .empty h3 { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 7px; }
    .empty p  { font-size: 13px; color: var(--text3); line-height: 1.7; }

    /* ─── QUEUE ──────────────────────────────────────────────── */
    .t-card { padding: 12px 14px; border-bottom: 1px solid var(--border); transition: background .1s; }
    .t-card:hover { background: var(--bg3); }
    .t-card-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.45; margin-bottom: 8px; word-break: break-word; overflow-wrap: anywhere; }
    .progress-rail { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; margin: 5px 0 7px; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width .5s; }
    .pf-dl    { background: var(--green); }  .pf-seed  { background: var(--cyan); }
    .pf-pause { background: var(--yellow); } .pf-err   { background: var(--red); }
    .pf-stall { background: var(--orange); } .pf-meta  { background: var(--purple); }
    .t-stats { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; font-size: 11px; color: var(--text2); font-family: var(--mono); }
    .state-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: .4px; }
    .sb-dl    { background: rgba(34,197,94,.15);   color: var(--green);  border: 1px solid rgba(34,197,94,.3); }
    .sb-seed  { background: rgba(56,189,248,.15);  color: var(--cyan);   border: 1px solid rgba(56,189,248,.3); }
    .sb-pause { background: rgba(234,179,8,.12);   color: var(--yellow); border: 1px solid rgba(234,179,8,.3); }
    .sb-err   { background: rgba(239,68,68,.15);   color: var(--red);    border: 1px solid rgba(239,68,68,.3); }
    .sb-stall { background: rgba(249,115,22,.12);  color: var(--orange); border: 1px solid rgba(249,115,22,.3); }
    .sb-meta  { background: rgba(100,116,139,.1);  color: var(--text3);  border: 1px solid rgba(100,116,139,.25); }
    .t-peers  { margin-left: auto; }
    .t-peers .s { color: var(--green); } .t-peers .l { color: var(--orange); }
    .t-actions { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .act-btn {
      background: var(--bg4); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text2); padding: 5px 10px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all .12s; display: flex; align-items: center; gap: 4px;
    }
    .act-btn:hover        { border-color: var(--bord2); color: var(--text); }
    .act-btn.danger:hover { border-color: var(--red); color: var(--red); }

    /* ─── TMDB POPOVER ───────────────────────────────────────── */
    .tmdb-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn .12s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .tmdb-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      max-width: 480px; width: 100%; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      animation: slideUp .15s ease;
    }
    @keyframes slideUp { from{transform:translateY(12px);opacity:0} to{transform:none;opacity:1} }
    .tmdb-inner { display: flex; gap: 0; }
    .tmdb-poster { width: 130px; flex-shrink: 0; }
    .tmdb-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tmdb-poster-empty { width: 130px; min-height: 180px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 32px; opacity: .2; flex-shrink: 0; }
    .tmdb-info { padding: 16px; flex: 1; min-width: 0; }
    .tmdb-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
    .tmdb-year  { font-size: 12px; color: var(--text3); margin-bottom: 10px; font-family: var(--mono); }
    .tmdb-rating { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .tmdb-score { font-size: 20px; font-weight: 700; font-family: var(--mono); color: var(--yellow); }
    .tmdb-votes { font-size: 11px; color: var(--text3); }
    .tmdb-overview { font-size: 12px; color: var(--text2); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
    .tmdb-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
    .tmdb-close { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; color: var(--text2); padding: 5px 14px; font-size: 12px; cursor: pointer; font-family: var(--sans); }
    .tmdb-close:hover { color: var(--text); border-color: var(--bord2); }
    .tmdb-loading { padding: 30px; text-align: center; color: var(--text3); font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .tmdb-none { padding: 24px 16px; color: var(--text3); font-size: 13px; text-align: center; }
    .tmdb-no-key { padding: 16px; color: var(--text3); font-size: 12px; text-align: center; line-height: 1.6; }
    .tmdb-no-key a { color: var(--cyan); }

    /* ─── SAVE PATH MODAL ────────────────────────────────────── */
    .sp-overlay {
      position: fixed; inset: 0; z-index: 150;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn .12s ease;
    }
    .sp-card {
      background: var(--bg2); border: 1px solid var(--bord2); border-radius: 10px;
      width: 100%; max-width: 460px; padding: 20px;
      box-shadow: 0 16px 50px rgba(0,0,0,.55);
      animation: slideUp .15s ease;
    }
    .sp-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 4px; letter-spacing: .3px; text-transform: uppercase; }
    .sp-name  { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 16px; word-break: break-word; }
    .sp-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .sp-input-row { display: flex; gap: 8px; align-items: center; }
    .sp-input {
      flex: 1; height: 38px;
      background: var(--bg3); border: 1px solid var(--bord2); border-radius: 6px;
      color: var(--text); padding: 0 12px; font-family: var(--mono); font-size: 12px; outline: none;
      transition: border-color .15s;
    }
    .sp-input:focus { border-color: var(--cyan); }
    .sp-input::placeholder { color: var(--text3); }
    .sp-hint { font-size: 11px; color: var(--text3); margin-top: 6px; line-height: 1.5; }
    .sp-hint strong { color: var(--text2); }
    .sp-quick { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .sp-quick-btn {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text3); padding: 3px 10px; font-size: 11px; font-family: var(--mono);
      cursor: pointer; transition: all .12s; white-space: nowrap;
    }
    .sp-quick-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .sp-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .sp-cancel {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text2); padding: 7px 16px; font-size: 13px; font-family: var(--sans);
      cursor: pointer; transition: all .12s;
    }
    .sp-cancel:hover { border-color: var(--bord2); color: var(--text); }
    .sp-confirm {
      background: var(--cyan); border: none; border-radius: 6px;
      color: #0f1117; padding: 7px 20px; font-size: 13px; font-weight: 600; font-family: var(--sans);
      cursor: pointer; transition: background .13s;
      display: flex; align-items: center; gap: 6px;
    }
    .sp-confirm:hover { background: #7dd3fc; }
    .sp-confirm:disabled { opacity: .4; cursor: default; }

    /* ─── MOBILE TAB BAR ─────────────────────────────────────── */
    .tab-bar { display: none; }

    /* ─── MISC ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bord2); border-radius: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    .spinner.sm { width: 9px; height: 9px; }

    /* ═══════════════════════════════════════════════════════════
       MOBILE LAYOUT  (≤ 700px)
    ═══════════════════════════════════════════════════════════ */
    @media (max-width: 700px) {
      body { overflow: hidden; }

      /* Header — compact */
      .header { padding: 0 12px; height: 48px; gap: 8px; }
      .logo { font-size: 13px; letter-spacing: 2px; }
      .vsep { display: none; }
      .ts   { display: none; }
      .speeds { gap: 8px; font-size: 10px; }

      /* Search */
      .search-section { padding: 8px 12px; }
      .search-btn { padding: 0 14px; font-size: 12px; }

      /* Filters — scrollable row, no wrapping */
      .filter-section { gap: 5px; }
      .filter-row { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
      .filter-row::-webkit-scrollbar { display: none; }

      /* Main — single column, switched by tab */
      .main { grid-template-columns: 1fr; }
      .results-panel { border-right: none; }

      /* Each panel fills the screen, hidden by default */
      .panel { display: none; flex: 1; }
      .panel.active { display: flex; }

      /* Table — hide less-important columns on mobile */
      col.col-type  { width: 80px; }
      col.col-size  { display: none; }
      col.col-leech { display: none; }
      col.col-src   { display: none; }
      col.col-act   { width: 72px; }
      .col-size-cell, .col-leech-cell, .col-src-cell { display: none; }
      thead th.hide-mobile, tbody td.hide-mobile { display: none; }

      /* Tab bar at bottom */
      .tab-bar {
        display: flex; flex-shrink: 0;
        background: var(--bg2); border-top: 1px solid var(--border);
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .tab-btn {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 3px; padding: 8px 4px;
        background: transparent; border: none; color: var(--text3);
        font-family: var(--sans); font-size: 10px; font-weight: 600;
        cursor: pointer; transition: color .12s; letter-spacing: .5px; text-transform: uppercase;
      }
      .tab-btn .tab-icon { font-size: 18px; }
      .tab-btn.active { color: var(--cyan); }
      .tab-btn.active .tab-icon { filter: drop-shadow(0 0 4px var(--cyan)); }

      /* Queue on mobile — slightly more padding for touch */
      .t-card { padding: 14px 14px; }
      .t-card-name { font-size: 13px; }
      .t-actions { gap: 6px; }
      .act-btn { padding: 7px 12px; font-size: 12px; }
      .add-btn  { padding: 6px 12px; font-size: 12px; }

      /* TMDB card on mobile */
      .tmdb-inner { flex-direction: column; }
      .tmdb-poster { width: 100%; height: 180px; }
      .tmdb-poster img { object-position: top; }
      .tmdb-poster-empty { width: 100%; height: 120px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">TORRENT<em>DECK</em></div>
  <div class="vsep"></div>
  <div class="status-chip" id="hdr-status"><div class="dot"></div>Connecting…</div>
  <div class="speeds" id="hdr-speeds" style="display:none"></div>
  <div class="spacer"></div>
  <span class="ts" id="hdr-ts"></span>
  <div class="theme-wrap" id="theme-wrap">
    <button class="theme-btn" id="theme-btn" title="Change theme">
      <span class="theme-icon" id="theme-icon">🎨</span>
      <span id="theme-btn-label">Theme</span>
    </button>
  </div>
</header>

<div class="search-section">
  <div class="search-row">
    <div class="input-wrap">
      <span class="prompt">›</span>
      <input type="text" id="q-input" placeholder="Search movies, shows, anime…" autocomplete="off" spellcheck="false" autocorrect="off">
    </div>
    <button class="search-btn" id="search-btn" disabled>Search</button>
  </div>
  <div class="filter-section" id="filter-section"></div>
</div>

<div class="main">
  <div class="panel results-panel active" id="panel-results">
    <div class="panel-head" id="results-head">Results</div>
    <div class="scroll-area" id="results-body">
      <div class="empty"><div class="empty-icon">🔍</div><h3>Ready to search</h3><p>Results appear here sorted by seeders.</p></div>
    </div>
  </div>
  <div class="panel" id="panel-queue">
    <div class="panel-head" id="queue-head">Queue</div>
    <div class="scroll-area" id="queue-body">
      <div class="empty"><div class="empty-icon">⏳</div><h3>Connecting…</h3><p>Reaching qBittorrent</p></div>
    </div>
  </div>
</div>

<!-- Mobile tab bar -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-results" onclick="switchTab('results')">
    <span class="tab-icon">🔍</span>Results
  </button>
  <button class="tab-btn" id="tab-queue" onclick="switchTab('queue')">
    <span class="tab-icon">📥</span><span id="tab-queue-label">Queue</span>
  </button>
</div>

<!-- TMDB popover container (injected by JS) -->
<div id="tmdb-root"></div>
<!-- Save path modal container -->
<div id="sp-root"></div>

<script>
// ─── Persistent state ─────────────────────────────────────────────────────────
// Sources are saved to localStorage so they survive page refresh

const DEFAULT_SOURCES = ['tpb','yts','eztv','nyaa','rarbg','1337x','custom','bitmagnet','prowlarr'];

function loadSources() {
  try {
    const saved = localStorage.getItem('td_sources');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length) return parsed;
    }
  } catch {}
  return ['tpb','yts','eztv','nyaa','rarbg','1337x','custom','bitmagnet'];
}
function saveSources(srcs) {
  try { localStorage.setItem('td_sources', JSON.stringify(srcs)); } catch {}
}

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  query:'', sources: loadSources(), typeFilter: null, qualityFilter: null,
  results:[], errors:{}, searching:false,
  addingId:null, fetchingId:null, addedIds: new Set(),
  sortCol:'seeders', sortDir:'desc',
  queue:[], qbOk:false, dlSpeed:0, ulSpeed:0, lastRefresh:null,
  tmdbAvailable: null,  // null=unknown, true=key set, false=no key
  activeTab: 'results', // mobile tab
};

const SOURCES = [
  { id:'tpb',       label:'The Pirate Bay', cls:'' },
  { id:'yts',       label:'YTS',            cls:'' },
  { id:'eztv',      label:'EZTV',           cls:'' },
  { id:'nyaa',      label:'Nyaa',           cls:'' },
  { id:'rarbg',     label:'TorrentGalaxy',  cls:'' },
  { id:'1337x',     label:'1337x',          cls:'' },
  { id:'custom',    label:'Custom',         cls:'' },
  { id:'bitmagnet', label:'Bitmagnet',      cls:'bm' },
  { id:'prowlarr',  label:'Prowlarr',       cls:'pr' },
];

const TYPES = [
  { key:'movie',      label:'Movie'          },
  { key:'episode',    label:'Episode'        },
  { key:'multi_ep',   label:'Multi-Ep'       },
  { key:'season',     label:'Season Pack'    },
  { key:'series',     label:'Complete Series'},
  { key:'anime_ep',   label:'Anime Ep'       },
  { key:'anime_pack', label:'Anime Batch'    },
  { key:'unknown',    label:'Unknown'        },
];

// Quality tags matched against torrent titles (order matters — most specific first)
const QUALITIES = [
  { key:'2160p', label:'4K',    regex:/\b(2160p|4K UHD|UHD|4K)\b/i },
  { key:'1080p', label:'1080p', regex:/\b1080[pi]\b/i },
  { key:'720p',  label:'720p',  regex:/\b720[pi]\b/i  },
  { key:'480p',  label:'480p',  regex:/\b480[pi]\b/i  },
  { key:'bluray',label:'BluRay',regex:/\b(BluRay|BDRip|BD Remux|REMUX)\b/i },
  { key:'web',   label:'WEB',   regex:/\b(WEB-DL|WEBRip|WEBDL|AMZN|NF|HULU)\b/i },
  { key:'hdtv',  label:'HDTV',  regex:/\bHDTV\b/i },
  { key:'cam',   label:'CAM',   regex:/\b(CAMRip|HDCAM|TS|TeleSync|DVDSCR)\b/i },
];

function detectQuality(title) {
  for (const q of QUALITIES) {
    if (q.regex.test(title)) return q.key;
  }
  return null;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtSpeed(n) {
  if (!n || n < 512) return '';
  const u = ['B/s','KB/s','MB/s','GB/s'];
  const i = Math.min(Math.floor(Math.log(n)/Math.log(1024)), 3);
  return `${(n/1024**i).toFixed(1)} ${u[i]}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stateInfo(s) {
  const m = {
    downloading:{l:'Downloading',c:'sb-dl',b:'pf-dl'},      uploading:{l:'Seeding',c:'sb-seed',b:'pf-seed'},
    stalledDL:  {l:'Stalled',   c:'sb-stall',b:'pf-stall'}, stalledUP:{l:'Seeding',c:'sb-seed',b:'pf-seed'},
    pausedDL:   {l:'Paused',    c:'sb-pause',b:'pf-pause'},  pausedUP: {l:'Paused',c:'sb-pause',b:'pf-pause'},
    checkingDL: {l:'Checking',  c:'sb-meta',b:'pf-meta'},   checkingUP:{l:'Checking',c:'sb-meta',b:'pf-meta'},
    metaDL:     {l:'Fetching',  c:'sb-meta',b:'pf-meta'},   error:     {l:'Error',  c:'sb-err',b:'pf-err'},
    missingFiles:{l:'Missing',  c:'sb-err',b:'pf-err'},      queuedDL: {l:'Queued', c:'sb-meta',b:'pf-meta'},
    queuedUP:   {l:'Queued',    c:'sb-meta',b:'pf-meta'},   allocating:{l:'Allocating',c:'sb-meta',b:'pf-meta'},
    moving:     {l:'Moving',    c:'sb-meta',b:'pf-meta'},
  };
  return m[s] || {l:s||'Unknown',c:'sb-meta',b:'pf-meta'};
}
function typeBadgeHtml(media) {
  if (!media) return '';
  const { type, label, detail } = media;
  return `<span class="type-badge tb-${esc(type)}"${detail?` title="${esc(detail)}"`:''}>` + esc(label) + `</span>`;
}
function getSourceUrl(item) {
  if (item.detailUrl) return item.detailUrl;
  const q = encodeURIComponent(item.title);
  const map = {
    tpb:       `https://thepiratebay.org/search.php?q=${q}`,
    yts:       `https://yts.mx/browse-movies/${encodeURIComponent(item.title.replace(/\s*\[.*$/,'').trim())}`,
    eztv:      `https://eztvx.to/search/${q}`,
    nyaa:      `https://nyaa.si/?q=${q}&s=seeders&o=desc`,
    rarbg:     `https://torrentgalaxy.to/torrents.php?search=${q}&sort=seeders&order=desc`,
    prowlarr:  null,
    bitmagnet: null,
    custom:    null,
  };
  return map[item.skey] || null;
}

// ─── Mobile tab switching ──────────────────────────────────────────────────────
function switchTab(tab) {
  S.activeTab = tab;
  const isMobile = window.innerWidth <= 700;
  if (isMobile) {
    document.getElementById('panel-results').classList.toggle('active', tab === 'results');
    document.getElementById('panel-queue').classList.toggle('active', tab === 'queue');
    document.getElementById('tab-results').classList.toggle('active', tab === 'results');
    document.getElementById('tab-queue').classList.toggle('active', tab === 'queue');
  } else {
    // On desktop both panels always show
    document.getElementById('panel-results').classList.add('active');
    document.getElementById('panel-queue').classList.add('active');
  }
}
window.addEventListener('resize', () => {
  if (window.innerWidth > 700) {
    document.getElementById('panel-results').classList.add('active');
    document.getElementById('panel-queue').classList.add('active');
  } else {
    switchTab(S.activeTab);
  }
});

// ─── TMDB Popover ─────────────────────────────────────────────────────────────
let tmdbCache = {};

async function showTMDB(title, skey) {
  const root = document.getElementById('tmdb-root');

  // Guess search type from source or media type
  const type = ['nyaa'].includes(skey) ? 'tv' : 'multi';

  // Strip release info from title for cleaner search
  const cleanTitle = title
    .replace(/\s*\[.*?\]/g, '')
    .replace(/\s*\(?\d{4}\)?\s*$/, '')
    .replace(/\b(1080p|720p|2160p|4k|bluray|webrip|web-dl|hdtv|x264|x265|hevc|avc|aac|mkv|mp4|dual|audio)\b.*/i, '')
    .replace(/\bS\d{2}E\d{2}.*$/i, '')
    .trim();

  // Show loading popover
  root.innerHTML = `<div class="tmdb-overlay" id="tmdb-overlay">
    <div class="tmdb-card">
      <div class="tmdb-loading"><span class="spinner"></span> Looking up on TMDB…</div>
    </div>
  </div>`;
  document.getElementById('tmdb-overlay').addEventListener('click', e => {
    if (e.target.id === 'tmdb-overlay') closeTMDB();
  });

  // Check cache
  const cacheKey = cleanTitle.toLowerCase();
  let data = tmdbCache[cacheKey];

  if (!data) {
    try {
      const r = await fetch(`/api/tmdb?q=${encodeURIComponent(cleanTitle)}&type=${type}`);
      data = await r.json();
      tmdbCache[cacheKey] = data;
    } catch(e) {
      data = { error: e.message };
    }
  }

  renderTMDBPopover(data, title);
}

function renderTMDBPopover(data, originalTitle) {
  const root = document.getElementById('tmdb-root');
  if (!root) return;

  let inner = '';
  if (data.error) {
    // Check if it's a "no key" error
    if (data.error.includes('not configured') || data.error.includes('503')) {
      inner = `<div class="tmdb-no-key">
        <div style="font-size:28px;margin-bottom:10px">🔑</div>
        <strong style="color:var(--text2)">TMDB not configured</strong><br><br>
        Get a free API key at <a href="https://www.themoviedb.org/settings/api" target="_blank">themoviedb.org</a>
        then add it to your Docker run command:<br><br>
        <code style="color:var(--cyan);font-family:var(--mono);font-size:11px">-e TMDB_API_KEY=your_key_here</code>
      </div>`;
    } else {
      inner = `<div class="tmdb-none">Lookup failed: ${esc(data.error)}</div>`;
    }
  } else if (!data.found) {
    inner = `<div class="tmdb-none">No TMDB match found for this title.</div>`;
  } else {
    const stars = data.rating ? '★'.repeat(Math.round(data.rating / 2)) + '☆'.repeat(5 - Math.round(data.rating / 2)) : '';
    inner = `
      <div class="tmdb-inner">
        ${data.poster
          ? `<div class="tmdb-poster"><img src="${esc(data.poster)}" alt="Poster" loading="lazy"></div>`
          : `<div class="tmdb-poster-empty">🎬</div>`}
        <div class="tmdb-info">
          <div class="tmdb-title">${esc(data.title)}</div>
          <div class="tmdb-year">${data.year || ''}${data.mediaType ? ` · ${data.mediaType === 'tv' ? 'TV Series' : data.mediaType === 'movie' ? 'Movie' : data.mediaType}` : ''}</div>
          ${data.rating ? `<div class="tmdb-rating">
            <span class="tmdb-score">${data.rating}</span>
            <span style="color:var(--yellow);font-size:13px">${stars}</span>
            <span class="tmdb-votes">${data.votes?.toLocaleString()} votes</span>
          </div>` : ''}
          ${data.overview ? `<div class="tmdb-overview">${esc(data.overview)}</div>` : '<div class="tmdb-overview" style="color:var(--text3)">No overview available.</div>'}
        </div>
      </div>`;
  }

  root.innerHTML = `<div class="tmdb-overlay" id="tmdb-overlay">
    <div class="tmdb-card">
      ${inner}
      <div class="tmdb-footer">
        <button class="tmdb-close" onclick="closeTMDB()">Close</button>
      </div>
    </div>
  </div>`;
  document.getElementById('tmdb-overlay').addEventListener('click', e => {
    if (e.target.id === 'tmdb-overlay') closeTMDB();
  });
}

function closeTMDB() {
  document.getElementById('tmdb-root').innerHTML = '';
}

// ─── DOM updaters — input never touched ───────────────────────────────────────

function updateHeader() {
  const st = document.getElementById('hdr-status');
  const sp = document.getElementById('hdr-speeds');
  const ts = document.getElementById('hdr-ts');
  if (st) st.innerHTML = `<div class="dot ${S.qbOk?'ok':'fail'}"></div>${
    S.qbOk
      ? `qBT &nbsp;·&nbsp; <strong>${S.queue.length}</strong>`
      : 'qBT offline'
  }`;
  if (sp) {
    const dl=fmtSpeed(S.dlSpeed), ul=fmtSpeed(S.ulSpeed);
    if (S.qbOk && (dl||ul)) { sp.style.display=''; sp.innerHTML=`${dl?`<span class="spd-dl">↓ ${dl}</span>`:''}${ul?`<span class="spd-ul">↑ ${ul}</span>`:''}`; }
    else sp.style.display='none';
  }
  if (ts && S.lastRefresh) ts.textContent = S.lastRefresh.toLocaleTimeString();
}

function updateFilters() {
  const el = document.getElementById('filter-section');
  if (!el) return;
  const errCount = Object.keys(S.errors).length;
  const counts   = typeCounts();
  const qcounts  = qualityCounts();
  const hasResults = S.results.length > 0;

  el.innerHTML = `
    <div class="filter-row">
      <span class="filter-label">Sources</span>
      ${SOURCES.map(s=>`
        <button class="pill ${s.cls} ${S.sources.includes(s.id)?'on':''}" data-src="${s.id}">
          ${s.label}${S.errors[s.id]?'<span class="err-dot"></span>':''}
        </button>`).join('')}
      ${errCount?`<span class="err-msg">${errCount} failed</span>`:''}
    </div>
    ${hasResults ? `
    <div class="filter-row">
      <span class="filter-label">Type</span>
      <button class="pill ${!S.typeFilter?'on':''}" data-type="">
        All <span style="opacity:.5;font-size:10px">${S.results.length}</span>
      </button>
      ${TYPES.filter(t=>counts[t.key]>0).map(t=>`
        <button class="pill tf-${t.key} ${S.typeFilter===t.key?'on':''}" data-type="${t.key}">
          ${t.label} <span style="opacity:.5;font-size:10px">${counts[t.key]}</span>
        </button>`).join('')}
    </div>
    ${Object.keys(qcounts).length > 0 ? `
    <div class="filter-row">
      <span class="filter-label">Quality</span>
      <button class="pill ${!S.qualityFilter?'on':''}" data-qual="">
        All
      </button>
      ${QUALITIES.filter(q=>qcounts[q.key]>0).map(q=>`
        <button class="pill qf ${S.qualityFilter===q.key?'on':''}" data-qual="${q.key}">
          ${q.label} <span style="opacity:.5;font-size:10px">${qcounts[q.key]}</span>
        </button>`).join('')}
    </div>` : ''}
    ` : ''}
  `;

  el.querySelectorAll('[data-src]').forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.src;
    S.sources = S.sources.includes(id) ? S.sources.filter(x=>x!==id) : [...S.sources, id];
    saveSources(S.sources);
    updateFilters();
  }));
  el.querySelectorAll('[data-type]').forEach(b => b.addEventListener('click', () => {
    S.typeFilter = b.dataset.type || null;
    updateFilters(); updateResultsPanel();
  }));
  el.querySelectorAll('[data-qual]').forEach(b => b.addEventListener('click', () => {
    S.qualityFilter = b.dataset.qual || null;
    updateFilters(); updateResultsPanel();
  }));
}

function typeCounts() {
  const c = {};
  for (const r of S.results) { const t = r.media?.type||'unknown'; c[t]=(c[t]||0)+1; }
  return c;
}

function qualityCounts() {
  const c = {};
  for (const r of S.results) {
    const q = detectQuality(r.title);
    if (q) c[q] = (c[q]||0) + 1;
  }
  return c;
}

function filteredResults() {
  let rows = S.results;
  if (S.typeFilter)    rows = rows.filter(r => r.media?.type === S.typeFilter);
  if (S.qualityFilter) rows = rows.filter(r => detectQuality(r.title) === S.qualityFilter);
  const col=S.sortCol, dir=S.sortDir==='asc'?1:-1;
  return [...rows].sort((a,b)=>{
    let av=a[col]??0, bv=b[col]??0;
    if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase();}
    return av<bv?-dir:av>bv?dir:0;
  });
}

function updateResultsPanel() {
  const head = document.getElementById('results-head');
  const body = document.getElementById('results-body');
  if (!head||!body) return;
  const rows  = filteredResults();
  const total = S.results.length;
  const shown = rows.length;

  head.innerHTML = `Results ${total?`<span class="count">${shown}${shown<total?` / ${total}`:''}</span>`:''}${S.searching?'<span class="spinner" style="margin-left:auto"></span>':''}`;

  if (rows.length===0 && !S.searching) {
    const activeFilter = S.qualityFilter
      ? `No ${QUALITIES.find(q=>q.key===S.qualityFilter)?.label||S.qualityFilter} results. Clear the quality filter.`
      : S.typeFilter && total > 0
        ? `No "${TYPES.find(t=>t.key===S.typeFilter)?.label}" results. Clear the type filter.`
        : `Search across ${S.sources.length} source${S.sources.length!==1?'s':''}.`;
    body.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>${total?'No matches':'No results yet'}</h3><p>${activeFilter}</p></div>`;
    return;
  }
  if (rows.length===0 && S.searching) {
    body.innerHTML = `<div class="empty"><div class="empty-icon"><span class="spinner"></span></div><h3 style="margin-top:14px">Searching…</h3></div>`;
    return;
  }

  body.innerHTML = `<table>
    <colgroup>
      <col class="col-name"><col class="col-type"><col class="col-size">
      <col class="col-seeds"><col class="col-leech"><col class="col-src"><col class="col-act">
    </colgroup>
    <thead><tr>
      <th data-col="title"    class="${S.sortCol==='title'   ?S.sortDir:''}">Name</th>
      <th data-col="media">Type</th>
      <th data-col="size"     class="${S.sortCol==='size'    ?S.sortDir:''} hide-mobile">Size</th>
      <th data-col="seeders"  class="${S.sortCol==='seeders' ?S.sortDir:''}">Seeds</th>
      <th data-col="leechers" class="${S.sortCol==='leechers'?S.sortDir:''} hide-mobile">Leech</th>
      <th data-col="source"   class="${S.sortCol==='source'  ?S.sortDir:''} hide-mobile">Source</th>
      <th></th>
    </tr></thead>
    <tbody>${rows.map(item=>{
      const isAdding=S.addingId===item.id, isFetch=S.fetchingId===item.id, isAdded=S.addedIds.has(item.id);
      const srcUrl = getSourceUrl(item);
      const titleHtml = srcUrl
        ? `<a href="${esc(srcUrl)}" target="_blank" rel="noopener noreferrer">${esc(item.title)}</a>`
        : esc(item.title);
      return `<tr>
        <td>
          <div class="t-name">${titleHtml}<button class="t-info-btn" data-tmdb-title="${esc(item.title)}" data-tmdb-skey="${esc(item.skey)}" title="Look up on TMDB">i</button></div>
        </td>
        <td>${typeBadgeHtml(item.media)}</td>
        <td class="hide-mobile"><span class="t-size">${esc(item.size||'?')}</span></td>
        <td><span class="t-seeds">${item.seeders}</span></td>
        <td class="hide-mobile"><span class="t-leech">${item.leechers}</span></td>
        <td class="hide-mobile"><span class="src-badge src-${esc(item.skey)}">${esc(item.source)}</span></td>
        <td>${isAdded
          ?`<button class="add-btn added" disabled>✓ Added</button>`
          :`<button class="add-btn" data-add="${esc(JSON.stringify(item))}" ${S.addingId||!S.qbOk?'disabled':''} title="${!S.qbOk?'qBittorrent offline':'Add to qBittorrent'}">${isAdding?(isFetch?'<span class="spinner sm"></span>…':'<span class="spinner sm"></span>'):'+ Add'}</button>`}
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;

  body.querySelectorAll('thead th[data-col]').forEach(th => {
    if (th.dataset.col === 'media') return;
    th.addEventListener('click', () => {
      S.sortDir = S.sortCol===th.dataset.col ? (S.sortDir==='desc'?'asc':'desc') : 'desc';
      S.sortCol = th.dataset.col;
      updateResultsPanel();
    });
  });
  body.querySelectorAll('[data-add]').forEach(btn => btn.addEventListener('click', () => {
    try { addTorrent(JSON.parse(btn.dataset.add)); } catch(e) { console.error(e); }
  }));
  body.querySelectorAll('[data-tmdb-title]').forEach(btn => btn.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    showTMDB(btn.dataset.tmdbTitle, btn.dataset.tmdbSkey);
  }));
}

function updateQueuePanel() {
  const head = document.getElementById('queue-head');
  const body = document.getElementById('queue-body');
  if (!head||!body) return;

  // Update mobile tab badge
  const tabLabel = document.getElementById('tab-queue-label');
  if (tabLabel) tabLabel.textContent = S.queue.length ? `Queue (${S.queue.length})` : 'Queue';

  head.innerHTML = `Queue ${S.queue.length?`<span class="count">${S.queue.length}</span>`:''}
    <button class="act-btn" id="refresh-btn" style="margin-left:auto;padding:4px 9px;font-size:11px">↻ Refresh</button>`;

  if (!S.queue.length) {
    body.innerHTML = `<div class="empty">
      <div class="empty-icon">${S.qbOk?'📭':'🔌'}</div>
      <h3>${S.qbOk?'Queue is empty':'Not connected'}</h3>
      <p>${S.qbOk?'Add a torrent from search results.':'Check QB_HOST and QB_PASS env vars.'}</p>
    </div>`;
  } else {
    body.innerHTML = S.queue.map(t => {
      const si=stateInfo(t.state), pct=(t.progress*100).toFixed(1);
      const paused=(t.state||'').toLowerCase().includes('paused');
      const dl=fmtSpeed(t.dlspeed), ul=fmtSpeed(t.upspeed);
      return `<div class="t-card">
        <div class="t-card-name">${esc(t.name)}</div>
        <div class="progress-rail"><div class="progress-fill ${si.b}" style="width:${pct}%"></div></div>
        <div class="t-stats">
          <span class="state-badge ${si.c}">${si.l}</span>
          <span style="color:var(--text)">${pct}%</span>
          ${dl?`<span class="spd-dl">↓ ${dl}</span>`:''}
          ${ul?`<span class="spd-ul">↑ ${ul}</span>`:''}
          <span class="t-peers">
            <span class="s">${t.num_seeds||0}</span><span style="color:var(--text3)"> / </span><span class="l">${t.num_leechs||0}</span>
          </span>
        </div>
        <div class="t-actions">
          ${paused
            ?`<button class="act-btn" data-act="resume" data-hash="${esc(t.hash)}">▶ Resume</button>`
            :`<button class="act-btn" data-act="pause"  data-hash="${esc(t.hash)}">⏸ Pause</button>`}
          <button class="act-btn danger" data-act="delete" data-hash="${esc(t.hash)}" data-delfiles="false">Remove</button>
          <button class="act-btn danger" data-act="delete" data-hash="${esc(t.hash)}" data-delfiles="true" title="Delete + files">+ Files</button>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('refresh-btn')?.addEventListener('click', refreshQueue);
  document.querySelectorAll('[data-act]').forEach(btn => btn.addEventListener('click', () => {
    const {act,hash,delfiles}=btn.dataset;
    if (act==='delete') {
      const wf = delfiles==='true';
      const name = S.queue.find(t=>t.hash===hash)?.name || 'this torrent';
      if (!confirm(wf?`Delete "${name}" AND all its files?\nThis cannot be undone.`:`Remove "${name}" from queue?\n(Files kept on disk)`)) return;
      torrentAction('delete', hash, {deleteFiles:wf});
    } else torrentAction(act, hash);
  }));
}

function updateSearchBtn() {
  const btn = document.getElementById('search-btn');
  if (!btn) return;
  btn.disabled = S.searching || !S.query.trim();
  btn.innerHTML = S.searching ? '<span class="spinner sm"></span> Searching…' : 'Search';
}

// ─── API ──────────────────────────────────────────────────────────────────────

async function search() {
  if (!S.query.trim() || S.searching) return;
  S.searching = true; S.results = []; S.errors = {}; S.typeFilter = null; S.qualityFilter = null;
  updateSearchBtn(); updateResultsPanel(); updateFilters();
  // On mobile, switch to results tab automatically
  if (window.innerWidth <= 700) switchTab('results');
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(S.query.trim())}&sources=${S.sources.join(',')}`);
    const d = await r.json();
    S.results = d.results || [];
    S.errors  = d.errors  || {};
  } catch(e) { S.errors = {_:e.message}; }
  S.searching = false;
  updateSearchBtn(); updateResultsPanel(); updateFilters();
}

// ─── Save path modal ──────────────────────────────────────────────────────────

// Paths are fetched from the server (set via QB_DOWNLOAD_PATHS env var)
let QUICK_PATHS = [];
fetch('/api/paths').then(r => r.json()).then(d => { QUICK_PATHS = d || []; }).catch(() => {});

function loadSavePath() {
  try { return localStorage.getItem('td_savepath') || ''; } catch { return ''; }
}
function rememberSavePath(p) {
  try { if (p.trim()) localStorage.setItem('td_savepath', p.trim()); } catch {}
}

// Show the save path modal; returns a Promise that resolves to
// { confirmed: true, savePath: '...' } or { confirmed: false }
function showSavePathModal(item) {
  return new Promise(resolve => {
    const root = document.getElementById('sp-root');
    const last = loadSavePath();

    // Build quick-path buttons — use configured label and show full path as tooltip
    const quickBtns = QUICK_PATHS.length
      ? QUICK_PATHS.map(p =>
          `<button class="sp-quick-btn" data-path="${esc(p.path)}" title="${esc(p.path)}">${esc(p.label)}</button>`
        ).join('')
      : '';

    // Default placeholder: first configured path, or /downloads
    const placeholder = QUICK_PATHS.length ? QUICK_PATHS[0].path : '/downloads';

    root.innerHTML = `
      <div class="sp-overlay" id="sp-overlay">
        <div class="sp-card">
          <div class="sp-title">Add to qBittorrent</div>
          <div class="sp-name">${esc(item.title)}</div>
          <label class="sp-label" for="sp-input">Save path <span style="color:var(--text3);font-weight:400;text-transform:none">(optional — leave blank for qBittorrent default)</span></label>
          <div class="sp-input-row">
            <input class="sp-input" id="sp-input" type="text"
              placeholder="${esc(placeholder)}"
              value="${esc(last)}"
              autocomplete="off" spellcheck="false" autocorrect="off">
          </div>
          ${quickBtns ? `<div class="sp-quick">${quickBtns}</div>` : ''}
          <div class="sp-hint">
            Use the <strong>container path</strong> that qBittorrent sees — e.g. <strong>/downloads/Movies</strong>,
            not the Unraid host path. Configure folders via <strong>QB_DOWNLOAD_PATHS</strong> in docker-compose.yml.
          </div>
          <div class="sp-footer">
            <button class="sp-cancel" id="sp-cancel">Cancel</button>
            <button class="sp-confirm" id="sp-confirm">+ Add Torrent</button>
          </div>
        </div>
      </div>`;

    const input   = document.getElementById('sp-input');
    const confirm = document.getElementById('sp-confirm');
    const cancel  = document.getElementById('sp-cancel');
    const overlay = document.getElementById('sp-overlay');

    // Quick path buttons
    root.querySelectorAll('[data-path]').forEach(btn => {
      btn.addEventListener('click', () => { input.value = btn.dataset.path; input.focus(); });
    });

    const doConfirm = () => {
      rememberSavePath(input.value);
      root.innerHTML = '';
      resolve({ confirmed: true, savePath: input.value.trim() });
    };
    const doCancel = () => { root.innerHTML = ''; resolve({ confirmed: false }); };

    confirm.addEventListener('click', doConfirm);
    cancel.addEventListener('click',  doCancel);
    overlay.addEventListener('click', e => { if (e.target.id === 'sp-overlay') doCancel(); });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doConfirm(); if (e.key === 'Escape') doCancel(); });

    input.focus();
    input.select();
  });
}

async function addTorrent(item) {
  if (S.addingId) return;

  // Show save path modal before doing anything
  const { confirmed, savePath } = await showSavePathModal(item);
  if (!confirmed) return;

  S.addingId = item.id; updateResultsPanel();
  try {
    let magnet=item.magnet||'', torrentUrl=item.torrentUrl||'';
    if (!magnet && item.needsMagnet && item.detailUrl) {
      S.fetchingId=item.id; updateResultsPanel();
      const r = await fetch(`/api/magnet?url=${encodeURIComponent(item.detailUrl)}`);
      const d = await r.json();
      magnet=d.magnet||''; S.fetchingId=null;
    }
    if (!magnet && !torrentUrl) { alert('Could not get magnet link.\nTry a TPB, Nyaa, or Bitmagnet result instead.'); return; }
    const r = await fetch('/api/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        magnet:     magnet     || undefined,
        torrentUrl: torrentUrl || undefined,
        savePath:   savePath   || undefined,
      }),
    });
    const d = await r.json();
    if (d.ok) {
      S.addedIds.add(item.id);
      setTimeout(refreshQueue, 800);
      if (window.innerWidth <= 700) setTimeout(() => switchTab('queue'), 900);
    } else alert(d.error || 'qBittorrent rejected the torrent.');
  } catch(e) { alert('Error: '+e.message); }
  S.addingId=null; S.fetchingId=null; updateResultsPanel();
}

async function refreshQueue() {
  try {
    const [tRes,xRes] = await Promise.all([fetch('/api/torrents'), fetch('/api/transferinfo')]);
    if (tRes.ok) S.queue = await tRes.json();
    if (xRes.ok) { const x=await xRes.json(); S.dlSpeed=x.dl_info_speed||0; S.ulSpeed=x.up_info_speed||0; }
    S.qbOk = true; S.lastRefresh = new Date();
  } catch { S.qbOk = false; }
  updateHeader(); updateQueuePanel();
}

async function torrentAction(action, hash, extra={}) {
  await fetch(`/api/torrent/${action}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hash,...extra})});
  setTimeout(refreshQueue, 400);
}

function loadTheme() {
  try { return localStorage.getItem('td_theme') || 'midnight'; } catch { return 'midnight'; }
}
function saveTheme(id) {
  try { localStorage.setItem('td_theme', id); } catch {}
}
function applyTheme(id) {
  document.documentElement.setAttribute('data-theme', id);
  const t = THEMES.find(x => x.id === id) || THEMES[0];
  const iconEl  = document.getElementById('theme-icon');
  const labelEl = document.getElementById('theme-btn-label');
  if (iconEl)  iconEl.textContent  = t.icon;
  if (labelEl) labelEl.textContent = t.label;
}

let themeDropOpen = false;

function openThemeDrop() {
  const wrap = document.getElementById('theme-wrap');
  const existing = document.getElementById('theme-dropdown');
  if (existing) { existing.remove(); themeDropOpen = false; return; }

  themeDropOpen = true;
  const currentId = loadTheme();
  const drop = document.createElement('div');
  drop.id = 'theme-dropdown';
  drop.className = 'theme-dropdown';
  drop.innerHTML = THEMES.map(t => `
    <div class="theme-option${t.id === currentId ? ' active' : ''}" data-tid="${t.id}">
      <div class="theme-swatch">
        <span style="background:${t.swatchBg};grid-column:1;grid-row:1 / span 2"></span>
        <span style="background:${t.swatchBg2};grid-column:2;grid-row:1"></span>
        <span style="background:${t.swatchAcc};grid-column:2;grid-row:2"></span>
      </div>
      <div class="theme-label">${t.icon} ${t.label}</div>
    </div>
  `).join('');

  drop.querySelectorAll('[data-tid]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.tid;
      applyTheme(id);
      saveTheme(id);
      drop.remove();
      themeDropOpen = false;
    });
  });

  wrap.appendChild(drop);

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!wrap.contains(e.target)) {
        drop.remove();
        themeDropOpen = false;
        document.removeEventListener('click', handler);
      }
    });
  }, 0);
}

// Apply saved theme immediately on load (before boot)
applyTheme(loadTheme());

// ─── Boot ─────────────────────────────────────────────────────────────────────
(function init() {
  const qi = document.getElementById('q-input');
  qi.addEventListener('input',   e => { S.query = e.target.value; updateSearchBtn(); });
  qi.addEventListener('keydown', e => { if (e.key==='Enter') search(); });

  // Only auto-focus on desktop (mobile keyboard pops up otherwise)
  if (window.innerWidth > 700) qi.focus();

  document.getElementById('search-btn').addEventListener('click', search);
  document.getElementById('theme-btn').addEventListener('click', e => { e.stopPropagation(); openThemeDrop(); });

  // Keyboard shortcut: press / or s to focus search (desktop)
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== qi) {
      e.preventDefault(); qi.focus();
    }
  });

  updateFilters();
  updateQueuePanel();

  // Initial qBT connection
  fetch('/api/qbt/status').then(r=>r.json())
    .then(d => { S.qbOk=d.ok; if(d.ok) refreshQueue(); else { updateHeader(); updateQueuePanel(); } })
    .catch(() => { updateHeader(); updateQueuePanel(); });

  setInterval(refreshQueue, 4000);

  // Apply correct layout for current screen width
  if (window.innerWidth > 700) {
    document.getElementById('panel-queue').classList.add('active');
  }
})();
</script>
