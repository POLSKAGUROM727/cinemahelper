version: "3.8"

services:
  torrentdeck:
    build: .
    container_name: torrentdeck
    restart: unless-stopped
    network_mode: host
    environment:
      # ── qBittorrent ────────────────────────────────────────────────────────
      - QB_HOST=http://localhost:8080
      - QB_USER=admin
      - QB_PASS=adminadmin               # ← change this

      # ── Download path shortcuts — shown as quick-fill buttons in the add modal ──
      # Format: "Label:containerPath" — use the path qBittorrent sees, not the Unraid host path
      # Your setup: /downloads maps to /mnt/user/Share/Jellyfin/
      - QB_DOWNLOAD_PATHS=Movies:/downloads/Movies,Shows:/downloads/Shows,Downloads:/downloads

      # ── Bitmagnet (optional) ───────────────────────────────────────────────
      - BITMAGNET_HOST=http://localhost:3333

      # ── TMDB (optional) — get a free key at themoviedb.org/settings/api ──
      # - TMDB_API_KEY=your_key_here

      # ── Prowlarr (optional) ────────────────────────────────────────────────
      # - PROWLARR_HOST=http://localhost:9696
      # - PROWLARR_KEY=your_prowlarr_api_key

      # ── TorrentDeck port ───────────────────────────────────────────────────
      - PORT=3000
