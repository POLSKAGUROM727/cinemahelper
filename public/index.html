<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TorrentDeck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0f1117;
      --bg2:    #161b27;
      --bg3:    #1e2433;
      --bg4:    #252d3d;
      --border: #2a3347;
      --bord2:  #334060;
      --green:  #22c55e;
      --cyan:   #38bdf8;
      --orange: #f97316;
      --red:    #ef4444;
      --yellow: #eab308;
      --purple: #a855f7;
      --blue:   #3b82f6;
      --pink:   #ec4899;
      --text:   #e2e8f0;
      --text2:  #94a3b8;
      --text3:  #64748b;
      --sans:   'Inter', system-ui, sans-serif;
      --mono:   'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: var(--sans); font-size: 14px; color: var(--text); display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .header {
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px; height: 54px; flex-shrink: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .logo { font-family: var(--mono); font-weight: 600; font-size: 15px; letter-spacing: 3px; color: var(--cyan); }
    .logo em { color: var(--green); font-style: normal; }
    .vsep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
    .status-chip {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 12px; font-size: 12px; color: var(--text2); white-space: nowrap;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
    .dot.ok   { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 3s infinite; }
    .dot.fail { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .speeds { display: flex; gap: 12px; font-size: 12px; font-family: var(--mono); }
    .spd-dl { color: var(--green); } .spd-ul { color: var(--cyan); }
    .spacer { flex: 1; }
    .ts { font-size: 11px; font-family: var(--mono); color: var(--text3); }

    /* ── SEARCH ── */
    .search-section { padding: 12px 20px; flex-shrink: 0; background: var(--bg2); border-bottom: 1px solid var(--border); }
    .search-row { display: flex; gap: 10px; }
    .input-wrap { flex: 1; position: relative; }
    .prompt { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--cyan); font-family: var(--mono); font-size: 16px; pointer-events: none; }
    input[type=text] {
      width: 100%; height: 40px;
      background: var(--bg3); border: 1px solid var(--bord2); border-radius: 6px;
      color: var(--text); padding: 0 14px 0 30px; font-family: var(--sans); font-size: 14px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type=text]:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(56,189,248,.1); }
    input[type=text]::placeholder { color: var(--text3); }
    .search-btn {
      height: 40px; padding: 0 22px;
      background: var(--cyan); border: none; border-radius: 6px;
      color: #0f1117; font-family: var(--sans); font-weight: 600; font-size: 13px;
      cursor: pointer; transition: background .15s, opacity .15s;
      display: flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .search-btn:hover:not(:disabled) { background: #7dd3fc; }
    .search-btn:disabled { opacity: .4; cursor: default; }

    /* ── FILTER ROWS ── */
    .filter-section { display: flex; flex-direction: column; gap: 7px; margin-top: 10px; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-right: 2px; white-space: nowrap; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
      color: var(--text2); padding: 3px 12px; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all .13s; user-select: none;
    }
    .pill:hover { border-color: var(--bord2); color: var(--text); }
    .pill.on      { background: rgba(56,189,248,.1);  border-color: var(--cyan);   color: var(--cyan); }
    .pill.cat.on  { background: rgba(249,115,22,.1);  border-color: var(--orange); color: var(--orange); }
    .pill.bm.on   { background: rgba(168,85,247,.1);  border-color: var(--purple); color: var(--purple); }

    /* type filter pills — each gets its own active colour */
    .pill.tf-movie.on    { background: rgba(59,130,246,.12);  border-color: var(--blue);   color: var(--blue); }
    .pill.tf-episode.on  { background: rgba(34,197,94,.12);   border-color: var(--green);  color: var(--green); }
    .pill.tf-multi_ep.on { background: rgba(34,197,94,.12);   border-color: var(--green);  color: var(--green); }
    .pill.tf-season.on   { background: rgba(56,189,248,.12);  border-color: var(--cyan);   color: var(--cyan); }
    .pill.tf-series.on   { background: rgba(168,85,247,.12);  border-color: var(--purple); color: var(--purple); }
    .pill.tf-anime_ep.on  { background: rgba(249,115,22,.12); border-color: var(--orange); color: var(--orange); }
    .pill.tf-anime_pack.on{ background: rgba(234,179,8,.12);  border-color: var(--yellow); color: var(--yellow); }
    .pill.tf-unknown.on  { background: rgba(100,116,139,.1);  border-color: var(--text3);  color: var(--text3); }

    .pill .err-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
    .filter-div { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }
    .err-msg { font-size: 11px; color: var(--red); margin-left: 4px; }

    /* ── LAYOUT ── */
    .main { display: grid; grid-template-columns: 1fr 390px; flex: 1; overflow: hidden; min-height: 0; }
    .panel { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .panel-head {
      display: flex; align-items: center; gap: 10px; padding: 9px 16px; flex-shrink: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--text2);
    }
    .panel-head .count { background: var(--bg4); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; font-size: 11px; color: var(--cyan); }
    .scroll-area { overflow-y: auto; flex: 1; min-height: 0; }
    .results-panel { border-right: 1px solid var(--border); }

    /* ── RESULTS TABLE ── */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.col-name  { width: auto; }
    col.col-type  { width: 90px; }
    col.col-size  { width: 76px; }
    col.col-seeds { width: 58px; }
    col.col-leech { width: 58px; }
    col.col-src   { width: 100px; }
    col.col-act   { width: 82px; }

    thead th {
      padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase; color: var(--text3);
      background: var(--bg2); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 5; cursor: pointer; user-select: none; white-space: nowrap;
    }
    thead th:hover { color: var(--text2); }
    thead th.asc::after  { content: " ↑"; }
    thead th.desc::after { content: " ↓"; }
    tbody tr:hover td { background: var(--bg3); }
    tbody tr:nth-child(even) td { background: rgba(255,255,255,.014); }
    tbody tr:nth-child(even):hover td { background: var(--bg3); }
    tbody td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }

    .t-name  { font-size: 13px; line-height: 1.5; word-break: break-word; overflow-wrap: anywhere; color: var(--text); }
    .t-size  { font-size: 12px; color: var(--text2); font-family: var(--mono); white-space: nowrap; }
    .t-seeds { font-size: 13px; color: var(--green);  font-family: var(--mono); font-weight: 600; }
    .t-leech { font-size: 13px; color: var(--orange); font-family: var(--mono); font-weight: 600; }

    /* ── TYPE BADGES ── */
    .type-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px; white-space: nowrap;
      letter-spacing: .3px; font-family: var(--mono);
    }
    .tb-movie     { background: rgba(59,130,246,.15);  color: var(--blue);   border: 1px solid rgba(59,130,246,.3); }
    .tb-episode   { background: rgba(34,197,94,.15);   color: var(--green);  border: 1px solid rgba(34,197,94,.3); }
    .tb-multi_ep  { background: rgba(34,197,94,.12);   color: #4ade80;       border: 1px solid rgba(34,197,94,.25); }
    .tb-season    { background: rgba(56,189,248,.15);  color: var(--cyan);   border: 1px solid rgba(56,189,248,.3); }
    .tb-series    { background: rgba(168,85,247,.15);  color: var(--purple); border: 1px solid rgba(168,85,247,.3); }
    .tb-anime_ep  { background: rgba(249,115,22,.15);  color: var(--orange); border: 1px solid rgba(249,115,22,.3); }
    .tb-anime_pack{ background: rgba(234,179,8,.15);   color: var(--yellow); border: 1px solid rgba(234,179,8,.3); }
    .tb-unknown   { background: rgba(100,116,139,.1);  color: var(--text3);  border: 1px solid rgba(100,116,139,.2); }

    /* ── SOURCE BADGES ── */
    .src-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 4px; white-space: nowrap; letter-spacing: .3px;
    }
    .src-tpb       { background: rgba(56,189,248,.12); color: var(--cyan);   border: 1px solid rgba(56,189,248,.25); }
    .src-yts       { background: rgba(234,179,8,.12);  color: var(--yellow); border: 1px solid rgba(234,179,8,.25); }
    .src-eztv      { background: rgba(236,72,153,.12); color: var(--pink);   border: 1px solid rgba(236,72,153,.25); }
    .src-nyaa      { background: rgba(168,85,247,.12); color: var(--purple); border: 1px solid rgba(168,85,247,.25); }
    .src-1337x     { background: rgba(249,115,22,.12); color: var(--orange); border: 1px solid rgba(249,115,22,.25); }
    .src-rarbg     { background: rgba(239,68,68,.12);  color: var(--red);    border: 1px solid rgba(239,68,68,.25); }
    .src-custom    { background: rgba(34,197,94,.12);  color: var(--green);  border: 1px solid rgba(34,197,94,.25); }
    .src-bitmagnet { background: rgba(59,130,246,.12); color: var(--blue);   border: 1px solid rgba(59,130,246,.25); }

    .add-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: transparent; border: 1px solid var(--green); border-radius: 5px;
      color: var(--green); padding: 4px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .13s; white-space: nowrap;
    }
    .add-btn:hover:not(:disabled) { background: var(--green); color: #0f1117; }
    .add-btn.added { border-color: var(--cyan); color: var(--cyan); cursor: default; background: rgba(56,189,248,.08); }
    .add-btn:disabled { opacity: .35; cursor: default; }

    /* ── EMPTY ── */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px 24px; text-align: center; }
    .empty-icon { font-size: 42px; margin-bottom: 16px; opacity: .25; }
    .empty h3 { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    .empty p  { font-size: 13px; color: var(--text3); line-height: 1.7; }

    /* ── QUEUE ── */
    .t-card { padding: 13px 16px; border-bottom: 1px solid var(--border); transition: background .1s; }
    .t-card:hover { background: var(--bg3); }
    .t-card-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.5; margin-bottom: 9px; word-break: break-word; overflow-wrap: anywhere; }
    .progress-rail { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; margin: 5px 0 8px; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width .5s; }
    .pf-dl    { background: var(--green); }  .pf-seed  { background: var(--cyan); }
    .pf-pause { background: var(--yellow); } .pf-err   { background: var(--red); }
    .pf-stall { background: var(--orange); } .pf-meta  { background: var(--purple); }
    .t-stats { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); font-family: var(--mono); }
    .state-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: .4px; }
    .sb-dl    { background: rgba(34,197,94,.15);   color: var(--green);  border: 1px solid rgba(34,197,94,.3); }
    .sb-seed  { background: rgba(56,189,248,.15);  color: var(--cyan);   border: 1px solid rgba(56,189,248,.3); }
    .sb-pause { background: rgba(234,179,8,.12);   color: var(--yellow); border: 1px solid rgba(234,179,8,.3); }
    .sb-err   { background: rgba(239,68,68,.15);   color: var(--red);    border: 1px solid rgba(239,68,68,.3); }
    .sb-stall { background: rgba(249,115,22,.12);  color: var(--orange); border: 1px solid rgba(249,115,22,.3); }
    .sb-meta  { background: rgba(100,116,139,.1);  color: var(--text3);  border: 1px solid rgba(100,116,139,.25); }
    .t-peers  { margin-left: auto; }
    .t-peers .s { color: var(--green); } .t-peers .l { color: var(--orange); }
    .t-actions { display: flex; gap: 6px; margin-top: 9px; }
    .act-btn {
      background: var(--bg4); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text2); padding: 5px 11px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all .12s; display: flex; align-items: center; gap: 5px;
    }
    .act-btn:hover        { border-color: var(--bord2); color: var(--text); }
    .act-btn.danger:hover { border-color: var(--red); color: var(--red); }

    /* ── MISC ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bord2); border-radius: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    .spinner.sm { width: 9px; height: 9px; }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">TORRENT<em>DECK</em></div>
  <div class="vsep"></div>
  <div class="status-chip" id="hdr-status"><div class="dot"></div>Connecting…</div>
  <div class="speeds" id="hdr-speeds" style="display:none"></div>
  <div class="spacer"></div>
  <span class="ts" id="hdr-ts"></span>
</header>

<div class="search-section">
  <div class="search-row">
    <div class="input-wrap">
      <span class="prompt">›</span>
      <input type="text" id="q-input" placeholder="Search movies, shows, anime…" autocomplete="off" spellcheck="false">
    </div>
    <button class="search-btn" id="search-btn" disabled>Search</button>
  </div>
  <div class="filter-section" id="filter-section"></div>
</div>

<div class="main">
  <div class="panel results-panel">
    <div class="panel-head" id="results-head">Results</div>
    <div class="scroll-area" id="results-body">
      <div class="empty"><div class="empty-icon">🔍</div><h3>Ready to search</h3><p>Results appear here sorted by seeders.</p></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head" id="queue-head">Queue</div>
    <div class="scroll-area" id="queue-body">
      <div class="empty"><div class="empty-icon">⏳</div><h3>Connecting…</h3><p>Reaching qBittorrent</p></div>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  query:'', sources:['tpb','yts','eztv','nyaa','rarbg','1337x','custom','bitmagnet'],
  typeFilter: null,   // null = all, else one of the type keys
  results:[], errors:{}, searching:false,
  addingId:null, fetchingId:null, addedIds:new Set(),
  sortCol:'seeders', sortDir:'desc',
  queue:[], qbOk:false, dlSpeed:0, ulSpeed:0, lastRefresh:null,
};

const SOURCES = [
  { id:'tpb',       label:'The Pirate Bay', cls:'' },
  { id:'yts',       label:'YTS (Movies)',   cls:'' },
  { id:'eztv',      label:'EZTV (TV)',      cls:'' },
  { id:'nyaa',      label:'Nyaa',           cls:'' },
  { id:'rarbg',     label:'TorrentGalaxy',  cls:'' },
  { id:'1337x',     label:'1337x',          cls:'' },
  { id:'custom',    label:'Custom',         cls:'' },
  { id:'bitmagnet', label:'Bitmagnet',      cls:'bm' },
];

// Type definitions: key → { label, desc }
const TYPES = [
  { key:'movie',      label:'Movie',          desc:'Films' },
  { key:'episode',    label:'Episode',        desc:'Single TV episode' },
  { key:'multi_ep',   label:'Multi-Ep',       desc:'Multiple episodes in one torrent' },
  { key:'season',     label:'Season Pack',    desc:'Full season' },
  { key:'series',     label:'Complete Series',desc:'Multiple seasons or complete run' },
  { key:'anime_ep',   label:'Anime Ep',       desc:'Single anime episode' },
  { key:'anime_pack', label:'Anime Batch',    desc:'Multiple anime episodes' },
  { key:'unknown',    label:'Unknown',        desc:'Could not be determined' },
];

const CATS = [
  { id:'movies', label:'Movies' },
  { id:'tv',     label:'TV Shows' },
  { id:'anime',  label:'Anime' },
];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtSpeed(n) {
  if (!n || n < 512) return '';
  const u = ['B/s','KB/s','MB/s','GB/s'];
  const i = Math.min(Math.floor(Math.log(n)/Math.log(1024)), 3);
  return `${(n/1024**i).toFixed(1)} ${u[i]}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stateInfo(s) {
  const m = {
    downloading:{l:'Downloading',c:'sb-dl',  b:'pf-dl'},   uploading:{l:'Seeding',c:'sb-seed',b:'pf-seed'},
    stalledDL:  {l:'Stalled',   c:'sb-stall',b:'pf-stall'},stalledUP:{l:'Seeding',c:'sb-seed',b:'pf-seed'},
    pausedDL:   {l:'Paused',    c:'sb-pause',b:'pf-pause'},pausedUP: {l:'Paused', c:'sb-pause',b:'pf-pause'},
    checkingDL: {l:'Checking',  c:'sb-meta', b:'pf-meta'}, checkingUP:{l:'Checking',c:'sb-meta',b:'pf-meta'},
    metaDL:     {l:'Fetching',  c:'sb-meta', b:'pf-meta'}, error:{l:'Error',c:'sb-err',b:'pf-err'},
    missingFiles:{l:'Missing',  c:'sb-err',  b:'pf-err'},  queuedDL:{l:'Queued',c:'sb-meta',b:'pf-meta'},
    queuedUP:   {l:'Queued',    c:'sb-meta', b:'pf-meta'}, allocating:{l:'Allocating',c:'sb-meta',b:'pf-meta'},
    moving:     {l:'Moving',    c:'sb-meta', b:'pf-meta'},
  };
  return m[s] || {l:s||'Unknown',c:'sb-meta',b:'pf-meta'};
}

function typeBadgeHtml(media) {
  if (!media) return '';
  const { type, label, detail } = media;
  const cls = `tb-${type}`;
  const title = detail ? ` title="${esc(detail)}"` : '';
  return `<span class="type-badge ${cls}"${title}>${esc(label)}</span>`;
}

// ─── Filtered + sorted results ────────────────────────────────────────────────
function filteredResults() {
  let rows = S.results;
  if (S.typeFilter) rows = rows.filter(r => r.media?.type === S.typeFilter);
  const col = S.sortCol, dir = S.sortDir === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    let av = a[col] ?? 0, bv = b[col] ?? 0;
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    return av < bv ? -dir : av > bv ? dir : 0;
  });
}

// Count how many results exist per type (for badges on filter pills)
function typeCounts() {
  const counts = {};
  for (const r of S.results) {
    const t = r.media?.type || 'unknown';
    counts[t] = (counts[t] || 0) + 1;
  }
  return counts;
}

// ─── Targeted DOM updates ─────────────────────────────────────────────────────

function updateHeader() {
  const st = document.getElementById('hdr-status');
  const sp = document.getElementById('hdr-speeds');
  const ts = document.getElementById('hdr-ts');
  if (st) st.innerHTML = `<div class="dot ${S.qbOk?'ok':'fail'}"></div>${
    S.qbOk
      ? `qBittorrent &nbsp;·&nbsp; <strong>${S.queue.length}</strong> torrent${S.queue.length!==1?'s':''}`
      : 'qBittorrent offline — check QB_HOST / QB_PASS'
  }`;
  if (sp) {
    const dl=fmtSpeed(S.dlSpeed), ul=fmtSpeed(S.ulSpeed);
    if (S.qbOk&&(dl||ul)){sp.style.display='';sp.innerHTML=`${dl?`<span class="spd-dl">↓ ${dl}</span>`:''}${ul?`<span class="spd-ul">↑ ${ul}</span>`:''}`;}
    else sp.style.display='none';
  }
  if (ts&&S.lastRefresh) ts.textContent = S.lastRefresh.toLocaleTimeString();
}

function updateFilters() {
  const el = document.getElementById('filter-section');
  if (!el) return;
  const errCount = Object.keys(S.errors).length;
  const counts   = typeCounts();
  const hasResults = S.results.length > 0;

  el.innerHTML = `
    <!-- Row 1: Sources -->
    <div class="filter-row">
      <span class="filter-label">Sources</span>
      ${SOURCES.map(s=>`
        <button class="pill ${s.cls} ${S.sources.includes(s.id)?'on':''}" data-src="${s.id}">
          ${s.label}${S.errors[s.id]?'<span class="err-dot"></span>':''}
        </button>`).join('')}
      ${errCount?`<span class="err-msg">${errCount} source${errCount>1?'s':''} failed</span>`:''}
    </div>
    <!-- Row 2: Type filter (only shown when results exist) -->
    ${hasResults ? `
    <div class="filter-row" id="type-filter-row">
      <span class="filter-label">Type</span>
      <button class="pill ${!S.typeFilter?'on':''}" data-type="">All <span style="opacity:.5;font-size:10px">${S.results.length}</span></button>
      ${TYPES.filter(t => counts[t.key] > 0).map(t=>`
        <button class="pill tf-${t.key} ${S.typeFilter===t.key?'on':''}" data-type="${t.key}" title="${t.desc}">
          ${t.label} <span style="opacity:.5;font-size:10px">${counts[t.key]}</span>
        </button>`).join('')}
    </div>` : ''}
  `;

  // Source pills
  el.querySelectorAll('[data-src]').forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.src;
    S.sources = S.sources.includes(id) ? S.sources.filter(x=>x!==id) : [...S.sources, id];
    updateFilters();
  }));
  // Type filter pills
  el.querySelectorAll('[data-type]').forEach(b => b.addEventListener('click', () => {
    S.typeFilter = b.dataset.type || null;
    updateFilters();
    updateResultsPanel();
  }));
}

function updateResultsPanel() {
  const head = document.getElementById('results-head');
  const body = document.getElementById('results-body');
  if (!head || !body) return;

  const rows  = filteredResults();
  const total = S.results.length;
  const shown = rows.length;
  const countLabel = total > 0
    ? `<span class="count">${shown}${shown < total ? ` / ${total}` : ''}</span>`
    : '';

  head.innerHTML = `Results ${countLabel}${S.searching?'<span class="spinner" style="margin-left:auto"></span>':''}`;

  if (rows.length === 0 && !S.searching) {
    const msg = S.typeFilter && total > 0
      ? `No ${TYPES.find(t=>t.key===S.typeFilter)?.label||S.typeFilter} results. Try a different type filter.`
      : `Search above to find torrents across ${S.sources.length} source${S.sources.length!==1?'s':''}.`;
    body.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>${total > 0 ? 'No matches' : 'No results yet'}</h3><p>${msg}</p></div>`;
    return;
  }
  if (rows.length === 0 && S.searching) {
    body.innerHTML = `<div class="empty"><div class="empty-icon"><span class="spinner"></span></div><h3 style="margin-top:14px">Searching…</h3></div>`;
    return;
  }

  body.innerHTML = `<table>
    <colgroup>
      <col class="col-name"><col class="col-type"><col class="col-size">
      <col class="col-seeds"><col class="col-leech"><col class="col-src"><col class="col-act">
    </colgroup>
    <thead><tr>
      <th data-col="title"    class="${S.sortCol==='title'   ?S.sortDir:''}">Name</th>
      <th data-col="media"    class="">Type</th>
      <th data-col="size"     class="${S.sortCol==='size'    ?S.sortDir:''}">Size</th>
      <th data-col="seeders"  class="${S.sortCol==='seeders' ?S.sortDir:''}">Seeds</th>
      <th data-col="leechers" class="${S.sortCol==='leechers'?S.sortDir:''}">Leech</th>
      <th data-col="source"   class="${S.sortCol==='source'  ?S.sortDir:''}">Source</th>
      <th></th>
    </tr></thead>
    <tbody>${rows.map(item => {
      const isAdding=S.addingId===item.id, isFetch=S.fetchingId===item.id, isAdded=S.addedIds.has(item.id);
      return `<tr>
        <td><div class="t-name">${esc(item.title)}</div></td>
        <td>${typeBadgeHtml(item.media)}</td>
        <td><span class="t-size">${esc(item.size||'?')}</span></td>
        <td><span class="t-seeds">${item.seeders}</span></td>
        <td><span class="t-leech">${item.leechers}</span></td>
        <td><span class="src-badge src-${esc(item.skey)}">${esc(item.source)}</span></td>
        <td>${isAdded
          ?`<button class="add-btn added" disabled>✓ Added</button>`
          :`<button class="add-btn" data-add="${esc(JSON.stringify(item))}" ${S.addingId||!S.qbOk?'disabled':''} title="${!S.qbOk?'qBittorrent offline':'Add to qBittorrent'}">${isAdding?(isFetch?'<span class="spinner sm"></span> Fetching…':'<span class="spinner sm"></span>'):'+ Add'}</button>`}
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;

  body.querySelectorAll('thead th[data-col]').forEach(th => {
    if (th.dataset.col === 'media') return; // type col not sortable
    th.addEventListener('click', () => {
      S.sortDir = S.sortCol===th.dataset.col ? (S.sortDir==='desc'?'asc':'desc') : 'desc';
      S.sortCol = th.dataset.col;
      updateResultsPanel();
    });
  });
  body.querySelectorAll('[data-add]').forEach(btn => btn.addEventListener('click', () => {
    try { addTorrent(JSON.parse(btn.dataset.add)); } catch(e) { console.error(e); }
  }));
}

function updateQueuePanel() {
  const head = document.getElementById('queue-head');
  const body = document.getElementById('queue-body');
  if (!head || !body) return;
  head.innerHTML = `Queue ${S.queue.length?`<span class="count">${S.queue.length}</span>`:''}
    <button class="act-btn" id="refresh-btn" style="margin-left:auto;padding:4px 10px;font-size:12px">↻ Refresh</button>`;
  if (!S.queue.length) {
    body.innerHTML = `<div class="empty">
      <div class="empty-icon">${S.qbOk?'📭':'🔌'}</div>
      <h3>${S.qbOk?'Queue is empty':'Not connected'}</h3>
      <p>${S.qbOk?'Add a torrent from search results.':'Check QB_HOST and QB_PASS in docker-compose.yml'}</p>
    </div>`;
  } else {
    body.innerHTML = S.queue.map(t => {
      const si=stateInfo(t.state), pct=(t.progress*100).toFixed(1);
      const paused=(t.state||'').toLowerCase().includes('paused');
      const dl=fmtSpeed(t.dlspeed), ul=fmtSpeed(t.upspeed);
      return `<div class="t-card">
        <div class="t-card-name">${esc(t.name)}</div>
        <div class="progress-rail"><div class="progress-fill ${si.b}" style="width:${pct}%"></div></div>
        <div class="t-stats">
          <span class="state-badge ${si.c}">${si.l}</span>
          <span style="color:var(--text)">${pct}%</span>
          ${dl?`<span class="spd-dl">↓ ${dl}</span>`:''}
          ${ul?`<span class="spd-ul">↑ ${ul}</span>`:''}
          <span class="t-peers">
            <span class="s">${t.num_seeds||0}</span><span style="color:var(--text3)"> / </span><span class="l">${t.num_leechs||0}</span>
          </span>
        </div>
        <div class="t-actions">
          ${paused
            ?`<button class="act-btn" data-act="resume" data-hash="${esc(t.hash)}">▶ Resume</button>`
            :`<button class="act-btn" data-act="pause"  data-hash="${esc(t.hash)}">⏸ Pause</button>`}
          <button class="act-btn danger" data-act="delete" data-hash="${esc(t.hash)}" data-delfiles="false">Remove</button>
          <button class="act-btn danger" data-act="delete" data-hash="${esc(t.hash)}" data-delfiles="true"  title="Delete + all files">+ Files</button>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('refresh-btn')?.addEventListener('click', refreshQueue);
  document.querySelectorAll('[data-act]').forEach(btn => btn.addEventListener('click', () => {
    const {act,hash,delfiles}=btn.dataset;
    if (act==='delete') {
      const wf=delfiles==='true';
      const name=S.queue.find(t=>t.hash===hash)?.name||'this torrent';
      if (!confirm(wf?`Delete "${name}" AND all its files?\nCannot be undone.`:`Remove "${name}" from queue? (Files kept)`)) return;
      torrentAction('delete', hash, {deleteFiles:wf});
    } else torrentAction(act, hash);
  }));
}

function updateSearchBtn() {
  const btn = document.getElementById('search-btn');
  if (!btn) return;
  btn.disabled = S.searching || !S.query.trim();
  btn.innerHTML = S.searching ? '<span class="spinner sm"></span> Searching…' : 'Search';
}

// ─── API ──────────────────────────────────────────────────────────────────────

async function search() {
  if (!S.query.trim() || S.searching) return;
  S.searching = true; S.results = []; S.errors = {}; S.typeFilter = null;
  updateSearchBtn(); updateResultsPanel(); updateFilters();
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(S.query.trim())}&sources=${S.sources.join(',')}`);
    const d = await r.json();
    S.results = d.results || [];
    S.errors  = d.errors  || {};
  } catch(e) { S.errors = {_: e.message}; }
  S.searching = false;
  updateSearchBtn(); updateResultsPanel(); updateFilters();
}

async function addTorrent(item) {
  if (S.addingId) return;
  S.addingId = item.id; updateResultsPanel();
  try {
    let magnet = item.magnet || '', torrentUrl = item.torrentUrl || '';
    if (!magnet && item.needsMagnet && item.detailUrl) {
      S.fetchingId = item.id; updateResultsPanel();
      const r = await fetch(`/api/magnet?url=${encodeURIComponent(item.detailUrl)}`);
      const d = await r.json();
      magnet = d.magnet || ''; S.fetchingId = null;
    }
    if (!magnet && !torrentUrl) { alert('Could not get magnet link.\nTry a TPB, Nyaa, or Bitmagnet result instead.'); return; }
    const r = await fetch('/api/add', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({magnet:magnet||undefined,torrentUrl:torrentUrl||undefined})});
    const d = await r.json();
    if (d.ok) { S.addedIds.add(item.id); setTimeout(refreshQueue, 800); }
    else alert(d.error || 'qBittorrent rejected the torrent.');
  } catch(e) { alert('Error: '+e.message); }
  S.addingId = null; S.fetchingId = null; updateResultsPanel();
}

async function refreshQueue() {
  try {
    const [tRes,xRes] = await Promise.all([fetch('/api/torrents'), fetch('/api/transferinfo')]);
    if (tRes.ok) S.queue = await tRes.json();
    if (xRes.ok) { const x=await xRes.json(); S.dlSpeed=x.dl_info_speed||0; S.ulSpeed=x.up_info_speed||0; }
    S.qbOk = true; S.lastRefresh = new Date();
  } catch { S.qbOk = false; }
  updateHeader(); updateQueuePanel();
}

async function torrentAction(action, hash, extra={}) {
  await fetch(`/api/torrent/${action}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hash,...extra})});
  setTimeout(refreshQueue, 400);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(function init() {
  const qi = document.getElementById('q-input');
  qi.addEventListener('input',   e => { S.query = e.target.value; updateSearchBtn(); });
  qi.addEventListener('keydown', e => { if (e.key==='Enter') search(); });
  qi.focus();
  document.getElementById('search-btn').addEventListener('click', search);
  updateFilters(); updateQueuePanel();
  fetch('/api/qbt/status').then(r=>r.json())
    .then(d => { S.qbOk=d.ok; if(d.ok) refreshQueue(); else { updateHeader(); updateQueuePanel(); } })
    .catch(() => { updateHeader(); updateQueuePanel(); });
  setInterval(refreshQueue, 4000);
})();
</script>
</body>
